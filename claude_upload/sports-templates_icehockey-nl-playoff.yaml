# Icehockey Playoff (IIHF-Reglement)
slug: icehockey-playoff
name: Icehockey Playoff
isDefault: false

periods:
  count: 3
  durationMinutes: 20
  breakMinutes: 15

overtime:
  enabled: true
  periods: null          # null = Open End / Sudden Death
  durationMinutes: 20
  suddenDeath: true
  breakMinutes: 15

shootout:
  enabled: false
  breakMinutes: 3

penalties:
  maxActiveSlots: 2
  queueEnabled: true
  queueOrderEditable: true
  types:
    - id: minor
      label: "2 Min"
      durationSeconds: 120
      displayMode: slot
      clearableByGoal: true

    - id: major
      label: "5 Min"
      durationSeconds: 300
      displayMode: slot
      clearableByGoal: false

    - id: misconduct
      label: "10'"
      durationSeconds: 600
      displayMode: badge
      clearableByGoal: false

    - id: game-misconduct
      label: "GM"
      durationSeconds: 0
      displayMode: badge
      clearableByGoal: false