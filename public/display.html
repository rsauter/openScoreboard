<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchuhr – Display</title>
<style>
  /* Display bleibt bewusst custom – vw/vh-basiert für TV/Beamer */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', 'Arial Black', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Äusserer Rahmen ── */
  .board-outer {
    flex: 1;
    display: flex;
    flex-direction: column;
    margin: 1.5vh 2vw;
    border: 2px solid #333;
    border-radius: 8px;
    overflow: hidden;
    background: #111;
  }

  /* ── Header-Zeile ── */
  .header-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    height: 10vh;
    position: relative;
  }

  .home-header {
    display: flex;
    align-items: center;
    padding: 0 2vw;
    /* Diagonaler Schnitt rechts */
    clip-path: polygon(0 0, calc(100% - 3vw) 0, 100% 100%, 0 100%);
    background: var(--home-color, #c0392b);
  }
  .away-header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 2vw;
    /* Diagonaler Schnitt links */
    clip-path: polygon(3vw 0, 100% 0, 100% 100%, 0 100%);
    background: var(--away-color, #2980b9);
  }
  .team-name {
    font-size: 2.8vw;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
  }

  /* ── Uhr Mitte ── */
  .clock-area {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8vw;
    padding: 0 2vw;
    z-index: 2;
    white-space: nowrap;
  }
  .clock {
    font-size: 4.5vw;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #fdcb6e;
    line-height: 1;
  }
  .clock.running { color: #fdcb6e; }
  .clock.paused  { color: #888; }
  .clock.ended   { color: #ff6b6b; }
  .clock.break   { color: #a29bfe; }

  .status-bullet {
    width: 1vw; height: 1vw;
    border-radius: 50%;
    background: #444;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-bullet.running { background: #00e676; box-shadow: 0 0 10px rgba(0,230,118,0.9); }
  .status-bullet.timeout { background: #fdcb6e; box-shadow: 0 0 10px rgba(253,203,110,0.9); }
  .status-bullet.stopped { background: #ff6b6b; }
  .status-bullet.inactive { background: #333; }

  /* ── Score-Bereich ── */
  .score-row {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    position: relative;
    min-height: 55vh;
  }

  /* ── Badge-Box innerhalb Score-Area ── */
  .pen-box-badge {
    min-width: 8vw;
    border-color: rgba(243,156,18,0.4);
  }
  .pen-box-badge .pen-header {
    color: #f39c12;
    border-bottom-color: rgba(243,156,18,0.3);
  }

  /* Penalty-Box-Container: absolut unten verankert */
  .pen-boxes-home {
    position: absolute;
    top: calc(1vh + 14vw + 1.5vh);
    left: 5vw;
    display: flex;
    flex-direction: row;
    gap: 0.5vw;
    align-items: flex-start;
    z-index: 2;
  }
  .pen-boxes-away {
    position: absolute;
    top: calc(1vh + 14vw + 1.5vh);
    right: 5vw;
    display: flex;
    flex-direction: row;
    gap: 0.5vw;
    align-items: flex-start;
    z-index: 2;
  }

  .home-score-area {
    background: var(--home-color, #c0392b);
    position: relative;
    clip-path: polygon(0 0, calc(100% - 4vw) 0, 100% 100%, 0 100%);
  }
  .home-score-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .away-score-area {
    background: var(--away-color, #2980b9);
    position: relative;
    clip-path: polygon(4vw 0, 100% 0, 100% 100%, 0 100%);
  }
  .away-score-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(225deg, transparent 40%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .score-digit {
    position: absolute;
    top: 1vh;
    font-size: 14vw;
    font-weight: 900;
    line-height: 1;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 1;
  }
  .home-score-area .score-digit { left: 5vw; }
  .away-score-area .score-digit { right: 5vw; }

  /* ── Mitte Score-Bereich (Timeout / leer) ── */
  .score-center {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    padding: 0 1vw;
    min-width: 16vw;
  }
  .timeout-box {
    background: #0d3b0d;
    border: 2px solid #2d8a2d;
    border-radius: 6px;
    padding: 1.2vh 1.5vw;
    text-align: center;
    display: none;
  }
  .timeout-box.active { display: block; }
  .timeout-label {
    font-size: 1.8vw;
    font-weight: 900;
    color: #00e676;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .timeout-info {
    font-size: 1.1vw;
    color: #aaa;
    margin-top: 0.3vh;
  }
  .shootout-box { text-align: center; }
  .so-label { font-size: 1.1vw; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.4vh; }
  .so-scores { font-size: 3.5vw; font-weight: 900; color: #fd79a8; }

  /* ── Strafen (innerhalb der Score-Areas) ── */
  .pen-box {
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
    background: rgba(0,0,0,0.5);
    min-width: 14vw;
    z-index: 1;
  }
  .pen-header {
    padding: 0.4vh 1vw;
    font-size: 1vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fdcb6e;
    text-align: center;
    border-bottom: 1px solid rgba(253,203,110,0.3);
  }
  .pen-item {
    padding: 0.5vh 1vw;
    margin: 2px;
    border-radius: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 1.8vw;
    font-weight: 800;
    background: rgba(0,0,0,0.4);
  }
  .pen-num { color: #fff; }
  .pen-rem { color: #fdcb6e; font-variant-numeric: tabular-nums; }
  .pen-waiting { opacity: 0.45; }
  .pen-waiting .pen-rem { color: #888; }
  .pen-badge .pen-rem { color: #f39c12; font-variant-numeric: normal; letter-spacing: 0.02em; }
  .pen-empty { padding: 0.5vh 1vw; font-size: 0.9vw; color: #555; text-align: center; }

  /* ── Phase-Bar ── */
  .phase-row {
    background: #0d0d0d;
    border-top: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.8vh 0;
  }
  .phase-label {
    font-size: 1.8vw;
    font-weight: 900;
    color: #fdcb6e;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  /* ── Ended-Banner ── */
.ended-banner {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  background: rgba(0,0,0,0.72);
  font-size: 6vw; font-weight: 900; color: #fdcb6e;
  text-shadow: 0 0 40px rgba(253,203,110,0.8);
  animation: pulse 1.2s infinite;
  pointer-events: none;
  z-index: 10;
}
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Connection-Dot ── */
.conn-dot {
  position: absolute;
  right: 5vw;
  width: 2vw;
  height: 0.25vh;
  border-radius: 2px;
  background: #333;
  transition: background 0.3s;
}
.conn-dot.connected { background: #00e676; box-shadow: 0 0 6px rgba(0,230,118,0.7); }
.conn-dot.disconnected { background: #444; }

</style>

</head>
